name: Python CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: action/checkout@v3
      - name: Install poetry
        run: pip install poetry
      - name: Set up Python
        uses: action/setup-python@v4
        with:
          python-version: '3.8'
          cache: 'poetry'
      - name: Install dependencies
        run: make install
      - run: make lint
      - run: make test
